<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公關品寄件管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#5B4FCF;--pd:#4338CA;--pl:#EEEEFF;
  --bg:#F7F8FC;--card:#FFF;--bd:#E5E7EB;
  --tx:#1F2937;--mu:#6B7280;--fa:#9CA3AF;
  --or:#D97706;--re:#DC2626;--gr:#059669;--bl:#2563EB;
  --sh:0 1px 3px rgba(0,0,0,.08);--shl:0 8px 24px rgba(0,0,0,.13);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;}
.header{background:var(--p);color:#fff;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(80,60,200,.25);}
.header h1{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;opacity:.7;margin-top:2px;}
.btn-add{background:#fff;color:var(--p);border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-add:hover{background:#EEF;}

/* TOOLBAR */
.toolbar{padding:12px 22px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:48px;z-index:100;}
.sbox{position:relative;flex:1;min-width:160px;}
.sbox input{width:100%;padding:7px 11px 7px 32px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;outline:none;transition:.15s;background:var(--bg);}
.sbox input:focus{border-color:var(--p);background:#fff;}
.sbox .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--fa);}

/* DROPDOWN (reusable) */
.dd-wrap{position:relative;}
.dd-trigger{display:flex;align-items:center;gap:5px;padding:7px 28px 7px 11px;border:1.5px solid var(--bd);border-radius:7px;background:#fff;cursor:pointer;font-size:13px;white-space:nowrap;user-select:none;transition:.15s;min-width:110px;}
.dd-trigger:hover,.dd-trigger.open{border-color:var(--p);}
.dd-trigger::after{content:'▾';position:absolute;right:9px;color:var(--fa);font-size:10px;}
.dd-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:100%;background:#fff;border:1.5px solid var(--p);border-radius:8px;box-shadow:var(--shl);z-index:400;overflow:hidden;}
.dd-menu.open{display:block;}
.dd-search{padding:7px 9px;border-bottom:1px solid var(--bd);}
.dd-search input{width:100%;border:1.5px solid var(--bd);border-radius:6px;padding:5px 9px;font-size:13px;outline:none;}
.dd-search input:focus{border-color:var(--p);}
.dd-opts{max-height:240px;overflow-y:auto;}
.dd-opt{padding:7px 13px;cursor:pointer;font-size:13px;transition:.1s;}
.dd-opt:hover{background:var(--pl);}
.dd-opt.sel{background:var(--pl);color:var(--p);font-weight:600;}
.dd-opt.hide{display:none;}

.cnt{background:var(--pl);color:var(--p);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700;white-space:nowrap;}

/* TABLE */
.tw{padding:18px 22px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--sh);}
thead tr{background:var(--p);color:#fff;}
thead th{padding:10px 13px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;}
tbody tr.main-row{border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s;}
tbody tr.main-row:hover{background:#FAFAFA;}
tbody tr.main-row.exp{background:var(--pl);}
td{padding:9px 13px;vertical-align:middle;}
.td-date{white-space:nowrap;color:var(--mu);font-size:12px;}
.td-camp{font-weight:700;color:var(--p);}
.td-ord{font-family:monospace;font-size:12px;color:var(--mu);}
.td-name{font-weight:600;}
.td-ph{color:var(--mu);font-size:13px;white-space:nowrap;}
.td-addr{color:var(--mu);max-width:180px;font-size:13px;}
.td-prod{max-width:200px;}
.pp{display:inline-block;background:#F3F4F6;border-radius:4px;padding:1px 6px;font-size:11px;margin:1px;vertical-align:middle;}
.pp .sku{color:var(--fa);font-size:10px;font-family:monospace;display:block;}
.ntdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--or);margin-left:3px;vertical-align:middle;}
.td-act{white-space:nowrap;text-align:right;}
.bx{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.1s;}
.bx-e{background:#EFF6FF;color:var(--bl);}.bx-e:hover{background:#DBEAFE;}
.bx-d{background:#FEF2F2;color:var(--re);}.bx-d:hover{background:#FEE2E2;}
.bx-c{background:#F0FDF4;color:var(--gr);}.bx-c:hover{background:#DCFCE7;}

/* EXPAND ROW */
.exp-row{display:none;}
.exp-row.open{display:table-row;}
.exp-cell{padding:0!important;}
.exp-in{padding:14px 18px 14px 36px;background:#FAFBFF;border-top:1px dashed var(--bd);}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
.elabel{font-size:11px;font-weight:700;color:var(--fa);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.eval{font-size:13px;}
.ptable{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
.ptable th{text-align:left;font-size:11px;font-weight:700;color:var(--fa);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid var(--bd);}
.ptable td{padding:5px 8px;border-bottom:1px solid #F3F4F6;vertical-align:middle;}
.ptable tr:last-child td{border:none;}
.sku-code{font-family:monospace;font-size:11px;color:var(--mu);background:#F3F4F6;padding:1px 5px;border-radius:3px;}
.nbox{background:#FFFBEB;border-left:3px solid var(--or);padding:7px 11px;border-radius:0 6px 6px 0;font-size:13px;color:var(--or);margin-top:10px;}
.erow-empty td{text-align:center;padding:48px;color:var(--fa);}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:var(--shl);}
.mhead{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.mhead h2{font-size:15px;font-weight:700;}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--fa);line-height:1;}
.mbody{padding:18px 20px;}
.fg{margin-bottom:13px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
input[type=text],input[type=date]{width:100%;padding:7px 10px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;outline:none;font-family:inherit;transition:.15s;}
input:focus{border-color:var(--p);}
.mfoot{padding:13px 20px;border-top:1px solid var(--bd);display:flex;gap:9px;justify-content:flex-end;}
.btn-ok{background:var(--p);color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-ok:hover{background:var(--pd);}
.btn-cc{background:var(--bg);color:var(--mu);border:1.5px solid var(--bd);border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer;}

/* PRODUCT TABLE IN MODAL */
.prod-editor{border:1.5px solid var(--bd);border-radius:8px;overflow:hidden;}
.pe-head{display:grid;grid-template-columns:1fr 120px 60px 32px;gap:0;background:#F9FAFB;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--bd);}
.pe-row{display:grid;grid-template-columns:1fr 120px 60px 32px;gap:4px;padding:5px 8px;border-bottom:1px solid #F3F4F6;align-items:center;}
.pe-row:last-of-type{border:none;}
.pe-row input{padding:5px 8px;border:1.5px solid var(--bd);border-radius:5px;font-size:13px;outline:none;font-family:inherit;width:100%;}
.pe-row input:focus{border-color:var(--p);}
.pe-row input[type=number]{width:100%;text-align:center;}
.btn-rm{background:#FEF2F2;color:var(--re);border:none;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.btn-addprod{margin:8px;padding:6px 12px;background:var(--pl);color:var(--p);border:1.5px dashed var(--p);border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;width:calc(100% - 16px);}
.hl{background:#FEF08A;border-radius:2px;}
@media(max-width:700px){.tw{padding:10px;}.exp-grid{grid-template-columns:1fr;}.fr{grid-template-columns:1fr;}.pe-head,.pe-row{grid-template-columns:1fr 100px 50px 32px;}}
</style>
</head>

<div class="header">

    <div class="dd-menu" id="ddMonthMenu">
      <div class="dd-opts" id="ddMonthOpts"></div>
    </div>
  </div>
  <!-- 活動 -->

      <div class="dd-opts" id="ddCampOpts"></div>
    </div>
  </div>
  <span class="cnt" id="cnt">0 筆</span>

<div class="tw">

    <tbody id="tb"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="ov" id="modal" style="display:none" onclick="if(event.target===this)closeM()">

        <div class="fg"><label>活動名稱 / 創作者 *</label><input type="text" id="f_camp" placeholder="例：安可星球"></div>
        <div class="fg"><label>填單日期 *</label><input type="date" id="f_date"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>訂單編號</label><input type="text" id="f_ord" placeholder="11503270006"></div>
        <div class="fg"><label>倉庫代號</label><input type="text" id="f_src" value="AA002-2"></div>
      </div>
      <div class="fr">
        <div class="fg"><label>收件人 *</label><input type="text" id="f_rec" placeholder="姓名"></div>
        <div class="fg"><label>電話 *</label><input type="text" id="f_ph" placeholder="0900-000-000"></div>
      </div>
      <div class="fg"><label>收件地址 *</label><input type="text" id="f_addr" placeholder="縣市區路號"></div>
      <div class="fg">
        <label>產品清單</label>
        <div class="prod-editor">
          <div class="pe-head"><span>產品名稱</span><span>SKU / 條碼</span><span>數量</span><span></span></div>
          <div id="pe-rows"></div>
          <button class="btn-addprod" onclick="addProdRow()">＋ 新增產品</button>
        </div>
      </div>
      <div class="fg"><label>備註</label><input type="text" id="f_note" placeholder="特殊說明…"></div>
    </div>
    <div class="mfoot">
      <button class="btn-cc" onclick="closeM()">取消</button>
      <button class="btn-ok" onclick="saveRec()">儲存</button>
    </div>
  </div>
</div>

function loadData(){try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);if(d&&d.length)return d;}}catch(e){}return SEED.map(r=>({...r,products:(r.products||[]).map(p=>({...p}))}))}
function saveData(){localStorage.setItem(SK,JSON.stringify(ship));}
let ship=loadData();
let nid=Math.max(...ship.map(r=>r.id))+1;

// ─── ESC / HIGHLIGHT ─────────────────────────────────────────────
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function hl(t){if(!q)return esc(t);return esc(t).replace(new RegExp('('+escRe(q)+')','gi'),'<span class="hl">$1</span>');}

// ─── DROPDOWN (generic) ──────────────────────────────────────────
function ddToggle(id){
  const menu=document.getElementById(id+'Menu');
  const trig=document.getElementById(id+'Trig');
  const open=menu.classList.toggle('open');
  trig.classList.toggle('open',open);
  if(open&&document.getElementById(id+'Srch')){
    document.getElementById(id+'Srch').value='';
    if(id==='ddCamp') buildCampOpts('');
    setTimeout(()=>document.getElementById(id+'Srch').focus(),50);
  }
}
document.addEventListener('click',e=>{
  ['ddMonth','ddCamp'].forEach(id=>{
    const w=document.getElementById(id);
    if(w&&!w.contains(e.target)){
      document.getElementById(id+'Menu').classList.remove('open');
      document.getElementById(id+'Trig').classList.remove('open');
    }
  });
});

// Month dropdown
function buildMonthOpts(){
  const months=[...new Set(ship.map(r=>r.date.slice(0,7)))].sort().reverse();
  const labels={'2026-01':'2026年 01月','2026-02':'2026年 02月','2026-03':'2026年 03月','2026-04':'2026年 04月','2026-05':'2026年 05月','2026-06':'2026年 06月'};
  const items=[{v:'all',l:'全部月份'},...months.map(m=>({v:m,l:labels[m]||m}))];
  document.getElementById('ddMonthOpts').innerHTML=items.map(it=>`<div class="dd-opt ${it.v===curMonth?'sel':''}" onclick="pickMonth('${it.v}')">${it.l}</div>`).join('');
}
function pickMonth(v){
  curMonth=v;
  document.getElementById('ddMonthLabel').textContent=v==='all'?'全部月份':(v.replace('-','年 ').replace(/(\d{2})$/,'$1月'));
  document.getElementById('ddMonthMenu').classList.remove('open');
  document.getElementById('ddMonthTrig').classList.remove('open');
  go();
}

// Campaign dropdown
function buildCampOpts(filter=''){
  const camps=[...new Set(ship.map(r=>r.campaign))].sort();
  const f=filter.toLowerCase();
  const items=[{v:'all',l:'全部活動'},...camps.map(c=>({v:c,l:c}))];
  document.getElementById('ddCampOpts').innerHTML=items.map(it=>`<div class="dd-opt ${it.v===curCamp?'sel':''} ${f&&!it.l.toLowerCase().includes(f)?'hide':''}" onclick="pickCamp('${it.v.replace(/'/g,"\\'")}')">${it.l}</div>`).join('');
}
function pickCamp(v){
  curCamp=v;
  document.getElementById('ddCampLabel').textContent=v==='all'?'全部活動':v;
  document.getElementById('ddCampMenu').classList.remove('open');
  document.getElementById('ddCampTrig').classList.remove('open');
  go();
}

// ─── FILTER & RENDER ─────────────────────────────────────────────
function go(){
  q=document.getElementById('srch').value.trim().toLowerCase();
  let data=[...ship];
  if(curMonth!=='all') data=data.filter(r=>r.date.startsWith(curMonth));
  if(curCamp!=='all') data=data.filter(r=>r.campaign===curCamp);
  if(q) data=data.filter(r=>{
    const hay=[r.campaign,r.orderNo,r.recipient,r.phone,r.address,r.notes,...(r.products||[]).flatMap(p=>[p.n,p.s])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  data.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('cnt').textContent=data.length+' 筆';
  renderTable(data);
}

function renderTable(data){
  const tb=document.getElementById('tb');
  if(!data.length){tb.innerHTML=`<tr class="erow-empty"><td colspan="8">😶 找不到符合的紀錄</td></tr>`;return;}
  tb.innerHTML=data.flatMap(r=>{
    const prods=r.products||[];
    const preview=prods.slice(0,2).map(p=>`<span class="pp">${hl(p.n)}${p.q>1?` ×${p.q}`:''}<span class="sku">${hl(p.s)}</span></span>`).join('');
    const more=prods.length>2?`<span class="pp" style="color:#9CA3AF">+${prods.length-2}項</span>`:'';
    const nDot=r.notes?`<span class="ntdot" title="${esc(r.notes)}"></span>`:'';
    return [
      `<tr class="main-row" id="mr${r.id}" onclick="tog(${r.id})">
        <td class="td-date">${r.date}</td>
        <td class="td-camp">${hl(r.campaign)}</td>
        <td class="td-ord">${hl(r.orderNo)}</td>
        <td class="td-name">${hl(r.recipient)}${nDot}</td>
        <td class="td-ph">${hl(r.phone)}</td>
        <td class="td-addr">${hl(r.address)}</td>
        <td class="td-prod">${preview}${more}</td>
        <td class="td-act" onclick="event.stopPropagation()">
          <button class="bx bx-c" onclick="copyRec(${r.id})">複製</button>
          <button class="bx bx-e" onclick="openEdit(${r.id})">編輯</button>
          <button class="bx bx-d" onclick="delRec(${r.id})">刪除</button>
        </td>
      </tr>`,
      `<tr class="exp-row" id="er${r.id}">
        <td class="exp-cell" colspan="8">
          <div class="exp-in">
            <div class="exp-grid">
              <div>
                <div class="elabel">訂單資訊</div>
                <div class="eval">📋 ${esc(r.orderNo)}</div>
                <div class="eval" style="font-size:12px;color:#9CA3AF;margin-top:2px;">倉庫：${esc(r.source||'AA002-2')} · ${esc(r.date)}</div>
              </div>
              <div>
                <div class="elabel">收件資訊</div>
                <div class="eval">👤 ${esc(r.recipient)}</div>
                <div class="eval">📞 ${esc(r.phone)}</div>
                <div class="eval">📍 ${esc(r.address)}</div>
              </div>
            </div>
            <div style="margin-top:12px;">
              <div class="elabel">產品清單（共 ${prods.length} 項）</div>
              <table class="ptable">
                <thead><tr><th>產品名稱</th><th>SKU / 條碼</th><th>數量</th></tr></thead>
                <tbody>${prods.map(p=>`<tr><td>${esc(p.n)}</td><td><span class="sku-code">${esc(p.s)}</span></td><td style="text-align:center;font-weight:600;">×${p.q}</td></tr>`).join('')}</tbody>
              </table>
            </div>
            ${r.notes?`<div class="nbox">⚠️ ${esc(r.notes)}</div>`:''}
          </div>
        </td>
      </tr>`
    ];
  }).join('');
}

function tog(id){
  const er=document.getElementById('er'+id);
  const mr=document.getElementById('mr'+id);
  if(!er) return;
  const open=er.classList.toggle('open');
  mr.classList.toggle('exp',open);
}

// ─── PRODUCT EDITOR IN MODAL ─────────────────────────────────────
let prodRows=[];
function renderProdRows(){
  document.getElementById('pe-rows').innerHTML=prodRows.map((p,i)=>`
    <div class="pe-row">
      <input type="text" value="${esc(p.n)}" placeholder="產品名稱" oninput="prodRows[${i}].n=this.value">
      <input type="text" value="${esc(p.s)}" placeholder="4713233981355" oninput="prodRows[${i}].s=this.value">
      <input type="number" value="${p.q}" min="1" oninput="prodRows[${i}].q=parseInt(this.value)||1" style="width:100%">
      <button class="btn-rm" onclick="rmProdRow(${i})">×</button>
    </div>`).join('');
}
function addProdRow(){prodRows.push({n:'',s:'',q:1});renderProdRows();}
function rmProdRow(i){prodRows.splice(i,1);renderProdRows();}

// ─── ADD / EDIT ───────────────────────────────────────────────────
function openAdd(){
  editId=null;
  document.getElementById('mtitle').textContent='新增寄件紀錄';
  document.getElementById('f_camp').value='';
  document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f_ord').value='';
  document.getElementById('f_src').value='AA002-2';
  document.getElementById('f_rec').value='';
  document.getElementById('f_ph').value='';
  document.getElementById('f_addr').value='';
  document.getElementById('f_note').value='';
  prodRows=[{n:'',s:'',q:1}];
  renderProdRows();
  document.getElementById('modal').style.display='flex';
}
function openEdit(id){
  const r=ship.find(x=>x.id===id);if(!r) return;
  editId=id;
  document.getElementById('mtitle').textContent='編輯寄件紀錄';
  document.getElementById('f_camp').value=r.campaign;
  document.getElementById('f_date').value=r.date;
  document.getElementById('f_ord').value=r.orderNo||'';
  document.getElementById('f_src').value=r.source||'AA002-2';
  document.getElementById('f_rec').value=r.recipient;
  document.getElementById('f_ph').value=r.phone;
  document.getElementById('f_addr').value=r.address;
  document.getElementById('f_note').value=r.notes||'';
  prodRows=(r.products||[]).map(p=>({...p}));
  if(!prodRows.length) prodRows=[{n:'',s:'',q:1}];
  renderProdRows();
  document.getElementById('modal').style.display='flex';
}
function closeM(){document.getElementById('modal').style.display='none';editId=null;}
function saveRec(){
  const campaign=document.getElementById('f_camp').value.trim();
  const date=document.getElementById('f_date').value;
  const recipient=document.getElementById('f_rec').value.trim();
  const phone=document.getElementById('f_ph').value.trim();
  const address=document.getElementById('f_addr').value.trim();
  if(!campaign||!date||!recipient||!phone||!address){alert('請填寫必要欄位');return;}
  const orderNo=document.getElementById('f_ord').value.trim();
  const source=document.getElementById('f_src').value.trim()||'AA002-2';
  const notes=document.getElementById('f_note').value.trim();
  const products=prodRows.filter(p=>p.n).map(p=>({n:p.n.trim(),s:p.s.trim(),q:parseInt(p.q)||1}));
  if(editId){
    const i=ship.findIndex(r=>r.id===editId);
    if(i>=0) ship[i]={...ship[i],campaign,date,orderNo,source,recipient,phone,address,notes,products};
  } else {
    ship.unshift({id:nid++,campaign,date,orderNo,source,recipient,phone,address,notes,products});
  }
  saveData();closeM();buildMonthOpts();buildCampOpts();go();
}
function copyRec(id){
  const r=ship.find(x=>x.id===id);if(!r) return;
  editId=null;
  document.getElementById('mtitle').textContent='複製寄件紀錄（新增）';
  document.getElementById('f_camp').value=r.campaign;
  document.getElementById('f_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f_ord').value='';
  document.getElementById('f_src').value=r.source||'AA002-2';
  document.getElementById('f_rec').value=r.recipient;
  document.getElementById('f_ph').value=r.phone;
  document.getElementById('f_addr').value=r.address;
  document.getElementById('f_note').value=r.notes||'';
  prodRows=(r.products||[]).map(p=>({...p}));
  if(!prodRows.length) prodRows=[{n:'',s:'',q:1}];
  renderProdRows();
  document.getElementById('modal').style.display='flex';
}
function delRec(id){
  const r=ship.find(x=>x.id===id);if(!r) return;
  if(!confirm(`確定刪除「${r.recipient}」的寄件紀錄？`)) return;
  ship=ship.filter(x=>x.id!==id);
  saveData();buildMonthOpts();buildCampOpts();go();
}

// ─── INIT ────────────────────────────────────────────────────────
buildMonthOpts();
buildCampOpts();
go();
